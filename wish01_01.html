   <div class="icon">

     {{if device === "WUP"}}
     <img src="image/placeholder/place_icon_wii_u.png" data-original="${ icon_url }" class="lazy" width="128" height="128" />
     {{else device === "CTR"}}
     <img src="image/placeholder/place_icon_3ds.png" data-original="${ icon_url }" class="lazy" width="72" height="72" />
     {{else}}

     </div>
   </div>
   {{/if}}
   <div class="title">

       <img src="image/shelf01_01/img_relating_00.png" width="165" height="29">
       {{/if}}
       </span>
       <span class="platform {{if device === "CTR"}}text-ctr{{else}}text-wup{{/if}}">${ platform_name }</span>
       <span class="release-date">${ str_date } ${ str_date_info }</span>
       <span class="rating">${ str_rating }</span>
     </div>
     <div class="price">
       {{if (is_normal_discount || is_conditional_discount || is_coupon_discount) }}
       <span class="strike-through"><span class="ordinary-price">${ regular_price }</span></span>
       <span class="{{if is_coupon_discount}}owned_coupon{{else is_conditional_discount}}conditional{{else is_normal_discount}}sale{{/if}}">{{html discount_price }}</span>
       {{else}}
       <span class="strike-through"><span class="ordinary-price"></span></span>
       <span>{{html regular_price }}</span>
       {{/if}}
     </div>
     </div>
 {{if disabled}}
 </div>
 {{else}}
 </a>
 {{/if}}
 {{if !disabled}}
 <a href="#" id="remove_button_${ data_title_id }" class="remove">
   <span></span>
 </a>
 {{/if}}

js?ts=1661318669" onerror="wiiuErrorViewer.openByCode(1119000);wiiuBrowser.jumpToHomeButtonMenu();"></script><script type="text/javascript" src="js/minified/analytics.js?ts=1661318669" onerror="wiiuErrorViewer.openByCode(1119000);wiiuBrowser.jumpToHomeButtonMenu();"></script><script lang="javascript">$(document).ready(function() {
